<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Add New Product</h4>
        </div>

        <div class="card-body">

            <form th:action="@{/save}" th:object="${product}" method="post">

                <!-- Name -->
                <div class="mb-3">
                    <label class="form-label">Product Name</label>
                    <input type="text" th:field="*{name}" class="form-control" placeholder="Enter product name">
                </div>

                <!-- Order -->
                <div class="mb-3">
                    <label class="form-label">Order</label>
                    <input type="number" th:field="*{pro_order}" class="form-control" placeholder="Enter order">
                </div>

                <!-- Active -->
                <div class="form-check mb-3">
                    <input type="checkbox" th:field="*{is_active}" class="form-check-input">
                    <label class="form-check-label">Active</label>
                </div>

                <!-- Buttons -->
                <div class="d-flex justify-content-between">
                    <a th:href="@{/}" class="btn btn-secondary">← Back</a>

                    <button type="submit" class="btn btn-success">
                        Save Product
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
